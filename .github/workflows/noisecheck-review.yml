# NoiseCheck AI Code Review — GitHub Actions CI 集成
# 在 PR 上自动运行代码审查，以 PR 评论形式输出结果
name: NoiseCheck Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install NoiseCheck
        run: |
          curl -fsSL https://raw.githubusercontent.com/github-clb520/noisecheck/main/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Code Review
        run: |
          nc review --from ${{ github.event.pull_request.base.sha }} \
                    --to ${{ github.event.pull_request.head.sha }} \
                    --format markdown \
                    --audience agent > review-report.md
        env:
          NC_LLM_URL: ${{ secrets.NC_LLM_URL }}
          NC_LLM_TOKEN: ${{ secrets.NC_LLM_TOKEN }}
          NC_LLM_MODEL: ${{ secrets.NC_LLM_MODEL || 'claude-sonnet-4-6' }}

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('review-report.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('## NoiseCheck'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report,
              });
            }
