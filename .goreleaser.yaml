# NoiseCheck — GoReleaser 配置
# 使用: goreleaser release --snapshot --clean
project_name: noisecheck

version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: noisecheck
    main: ./cmd/noisecheck
    binary: noisecheck
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: noisecheck
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README*.md
      - CHANGELOG.md
      - LICENSE
    name_template: >-
      {{.ProjectName}}_{{.Version}}_{{- if eq .Os "darwin" }}macOS{{- else }}{{ .Os }}{{ end }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: github-clb520
    name: noisecheck
  draft: true
  replace_existing_draft: true
